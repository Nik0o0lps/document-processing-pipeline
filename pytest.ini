[pytest]
# Configuração do pytest

# Diretórios de teste
testpaths = tests

# Padrão de arquivos de teste
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções de saída
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --cov=src
    --cov-report=term-missing
    --cov-report=html

# Markers para categorização de testes
markers =
    slow: marca testes lentos (deselecione com '-m "not slow"')
    integration: testes de integração com APIs reais
    unit: testes unitários rápidos

# Configurações de cobertura
[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
